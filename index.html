<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gato-Craft Clicker: Mundos Secretos v3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; user-select: none; }
        
        body {
            font-family: 'Press Start 2P', monospace;
            background-color: #2c2c2c;
            background-image: linear-gradient(rgba(0,0,0,0.4) 2px, transparent 2px), linear-gradient(90deg, rgba(0,0,0,0.4) 2px, transparent 2px);
            background-size: 16px 16px;
            color: #fff;
            margin: 0;
            padding: 20px;
            image-rendering: pixelated;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #ffff55;
            text-shadow: 3px 3px #3f3f00, -2px -2px #000;
            font-size: 24px;
            text-align: center;
            margin: 10px 0;
        }

        .layout {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        /* Paneles */
        .panel {
            background-color: #4a4a4a;
            border: 6px solid #1a1a1a;
            box-shadow: inset -4px -4px #2b2b2b, inset 4px 4px #737373;
            padding: 20px;
            border-radius: 2px;
        }

        .panel-main { flex: 1.2; min-width: 360px; text-align: center; }
        .panel-side { flex: 1; min-width: 340px; height: 650px; overflow-y: auto; }

        /* Marcadores y HUD de Minecraft */
        .hud-box {
            background-color: #141414;
            border: 4px solid #373737;
            padding: 15px;
            font-size: 12px;
            color: #55ff55;
            text-shadow: 2px 2px #003f00;
            box-shadow: inset 0 0 12px #000;
            margin-bottom: 15px;
            text-align: left;
        }

        .hud-line { margin: 8px 0; display: flex; justify-content: space-between; }

        /* Barra de Experiencia Minecraft */
        .exp-bar-container {
            width: 100%;
            height: 14px;
            background-color: #111;
            border: 2px solid #555;
            margin: 10px 0;
            position: relative;
        }
        .exp-bar-fill {
            width: 0%;
            height: 100%;
            background-color: #55ff55;
            transition: width 0.1s;
        }

        /* Escenario Dinámico */
        .world-stage {
            height: 240px;
            background-color: #318047; /* Pradera por defecto */
            border: 4px solid #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }

        /* Personaje Principal Pixelado */
        .character-box {
            width: 120px;
            height: 120px;
            cursor: pointer;
            position: relative;
            transition: transform 0.05s;
            z-index: 10;
        }
        .character-box:active { transform: scale(0.88); }

        .char-skin {
            width: 100%; height: 100%;
            background: #b5b5b5;
            border: 6px solid #000;
            box-shadow: inset -10px -10px 0px #8c8c8c;
            position: relative;
        }
        .char-skin::before {
            content: ''; position: absolute; top: 22px; left: 16px;
            width: 14px; height: 14px; background: #000; box-shadow: 58px 0 #000;
        }
        .char-skin::after {
            content: ''; position: absolute; top: 48px; left: 42px;
            width: 24px; height: 10px; background: #ffaaaa;
        }

        /* Estilo UI Botones */
        .section-title {
            color: #ffaa00; font-size: 11px; text-shadow: 2px 2px #000;
            margin: 15px 0 10px 0; padding-bottom: 4px; border-bottom: 4px solid #1a1a1a;
        }

        .mc-btn {
            background-color: #9e9e9e;
            border: 4px solid #000;
            box-shadow: inset -4px -4px #5e5e5e, inset 4px 4px #dfdfdf;
            color: #e0e0e0;
            font-family: 'Press Start 2P', monospace;
            font-size: 9px; padding: 12px; width: 100%; margin-bottom: 8px;
            cursor: pointer; text-shadow: 2px 2px #2e2e2e;
            display: flex; justify-content: space-between; align-items: center;
        }
        .mc-btn:hover:not(:disabled) {
            background-color: #a7b3cd; color: #fff;
            box-shadow: inset -4px -4px #4c5870, inset 4px 4px #eef3ff;
        }
        .mc-btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }
        .price { color: #ffff55; }

        /* Partículas flotantes */
        .particle {
            position: absolute; color: #55ffff; font-size: 14px;
            text-shadow: 2px 2px #000; font-weight: bold;
            pointer-events: none; animation: flyUp 0.6s ease-out forwards;
        }
        @keyframes flyUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-70px) scale(0.7); }
        }

        /* Alertas */
        #toast {
            position: fixed; bottom: -100px; right: 20px; background-color: #212121;
            border: 4px solid #55ff55; padding: 15px; display: flex; align-items: center;
            gap: 12px; transition: bottom 0.4s ease; z-index: 100; box-shadow: 4px 4px 0 #000;
        }
        #toast.show { bottom: 20px; }
    </style>
</head>
<body>

    <h1>MAPA DE LOS MUNDOS SECRETOS v3.0</h1>
    
    <div class="layout">
        <!-- PANTALLA PRINCIPAL -->
        <div class="panel panel-main">
            <div class="hud-box">
                <div class="hud-line"><span>💎 ESMERALDAS:</span><span id="score" style="color:#55ff55">0</span></div>
                <div class="hud-line"><span>🌍 DIMENSIÓN:</span><span id="world-name" style="color:#ffff55">Mundo Bloques</span></div>
                <div class="hud-line"><span>🐾 AVATAR:</span><span id="rank" style="color:#ff55ff">Gatito Novato</span></div>
                <div class="hud-line"><span>✨ MULTIPLICADOR:</span><span>x<span id="multi">1</span></span></div>
                <div class="hud-line" style="font-size:10px; color:#aaa;"><span>Auto-Minería:</span><span><span id="cps">0</span>/seg</span></div>
            </div>

            <!-- Barra de nivel/Prestigio -->
            <div style="font-size:9px; text-align:left; color:#ffaa00;">Progreso de Dimensión:</div>
            <div class="exp-bar-container"><div id="exp-bar" class="exp-bar-fill"></div></div>

            <!-- Escenario donde clickar -->
            <div class="world-stage" id="stage">
                <div id="character" class="character-box">
                    <div id="skin" class="char-skin"></div>
                </div>
            </div>
            
            <button id="btn-prestige" class="mc-btn" style="background-color:#4a0e4e; color:#ff55ff;" onclick="doPrestige()" disabled>
                <span>🌀 VIAJE RECONSTRUCCIÓN (LORE +1)</span> <span class="price">Necesitas 100K</span>
            </button>
        </div>

        <!-- TIENDA AVANZADA -->
        <div class="panel panel-side">
            <div class="section-title">🗺️ VIAJAR A OTRO MUNDO SECRETOS</div>
            <button id="btn-world1" class="mc-btn" onclick="travel(1)"><span>• Mundo Bloques (x1)</span> <span style="color:#55ff55">ACTIVO</span></button>
            <button id="btn-world2" class="mc-btn" onclick="travel(2)" disabled><span>• Vacío Hacker (x3)</span> <span class="price">800 💎</span></button>
            <button id="btn-world3" class="mc-btn" onclick="travel(3)" disabled><span>• El Fin del Mapa (x10)</span> <span class="price">5,000 💎</span></button>

            <div class="section-title">🧬 EVOLUCIONES DEL LORE</div>
            <div id="shop-skins">
                <button id="skin1" class="mc-btn" onclick="evolve('blanquito')"><span>Blanquito 🤍</span> <span class="price">20 💎</span></button>
                <button id="skin2" class="mc-btn" onclick="evolve('tigre')" disabled><span>Tigre 🐯</span> <span class="price">150 💎</span></button>
                <button id="skin3" class="mc-btn" onclick="evolve('nube')" disabled><span>Pelusa Nube ☁️</span> <span class="price">1,000 💎</span></button>
                <button id="skin4" class="mc-btn" onclick="evolve('hacker')" disabled><span>Gato Hacker 💻</span> <span class="price">6,000 💎</span></button>
                <button id="skin5" class="mc-btn" onclick="evolve('celestial')" disabled><span>Blanquito Celestial ✨</span> <span class="price">30,000 💎</span></button>
            </div>

            <div class="section-title">🤖 MINEROS INDUSTRIALES (CPS)</div>
            <div id="shop-auto">
                <button id="auto1" class="mc-btn" onclick="buyMiner('pick')"><span>Pico Automatizado (+1/s)</span> <span class="price" id="p1">40 💎</span></button>
                <button id="auto2" class="mc-btn" onclick="buyMiner('creeper')"><span>Creeper Aliado (+6/s)</span> <span class="price" id="p2">250 💎</span></button>
                <button id="auto3" class="mc-btn" onclick="buyMiner('golem')"><span>Golem de Redstone (+40/s)</span> <span class="price" id="p3">1,800 💎</span></button>
                <button id="auto4" class="mc-btn" onclick="buyMiner('quarry')"><span>Cantera del Fin (+250/s)</span> <span class="price" id="p4">12,000 💎</span></button>
            </div>
        </div>
    </div>

    <!-- TOAST DE LOGRO -->
    <div id="toast">
        <div style="font-size: 20px;">🏆</div>
        <div>
            <div style="color: #55ff55; font-size: 9px; margin-bottom: 2px;">¡NUEVA AVENTURA!</div>
            <div id="toast-msg" style="font-size: 10px;">¡Has iniciado el viaje!</div>
        </div>
    </div>

    <script>
        // ESTADO GLOBAL DEL JUEGO
        let data = {
            score: 0, clickBase: 1, autoBase: 0,
            worldMult: 1, loreMultiplier: 1,
            rank: "Gatito Novato", currentWorld: 1,
            unlockedWorlds: [1], unlockedSkins: []
        };

        let prices = { pick: 40, creeper: 250, golem: 1800, quarry: 12000 };

        const char = document.getElementById('character');
        const skin = document.getElementById('skin');
        const stage = document.getElementById('stage');

        // Generador de sonidos Synth
        function noise(f, t, d) {
            let ctx = new (window.AudioContext || window.webkitAudioContext)();
            let o = ctx.createOscillator(); let g = ctx.createGain();
            o.type = t; o.frequency.value = f; o.connect(g); g.connect(ctx.destination);
            o.start(); g.gain.setValueAtTime(0.08, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + d); o.stop(ctx.currentTime + d);
        }

        // Acción Click
        char.addEventListener('click', (e) => {
            let totalClick = data.clickBase * data.worldMult * data.loreMultiplier;
            data.score += totalClick;
            
            // Render Partícula
            let r = stage.getBoundingClientRect();
            let p = document.createElement('div'); p.className = 'particle';
            p.innerText = '+' + Math.floor(totalClick);
            p.style.left = (e.clientX - r.left) + 'px'; p.style.top = (e.clientY - r.top) + 'px';
            stage.appendChild(p); setTimeout(() => p.remove(), 550);

            noise(180, 'triangle', 0.04);
            update();
        });

        // Loop Automático (CPS)
        setInterval(() => {
            if (data.autoBase > 0) {
                data.score += (data.autoBase * data.worldMult * data.loreMultiplier) / 10;
                update();
            }
        }, 100);

        // Sistema de Evolución
        function evolve(type) {
            if (type === 'blanquito' && data.score >= 20) {
                data.score -= 20; data.clickBase = 3; data.rank = "Blanquito 🤍";
                skin.style.background = "#fff"; skin.style.boxShadow = "inset -10px -10px 0 #ddd";
                data.unlockedSkins.push('b'); alertToast("¡Desbloqueaste a Blanquito!");
            } else if (type === 'tigre' && data.score >= 150) {
                data.score -= 150; data.clickBase = 12; data.rank = "Tigre 🐯";
                skin.style.background = "#ff9933"; skin.style.boxShadow = "inset -10px -10px 0 #cc6600";
                data.unlockedSkins.push('t'); alertToast("¡Tigre se une al equipo!");
            } else if (type === 'nube' && data.score >= 1000) {
                data.score -= 1000; data.clickBase = 60; data.rank = "Pelusa Nube ☁️";
                skin.style.background = "#def"; skin.style.boxShadow = "inset -10px -10px 0 #abc";
                data.unlockedSkins.push('n'); alertToast("Poderes de Nube activados");
            } else if (type === 'hacker' && data.score >= 6000) {
                data.score -= 6000; data.clickBase = 400; data.rank = "Gato Hacker 💻";
                skin.style.background = "#22ff22"; skin.style.boxShadow = "inset -10px -10px 0 #006600";
                data.unlockedSkins.push('h'); alertToast("Bypass del sistema completado");
            } else if (type === 'celestial' && data.score >= 30000) {
                data.score -= 30000; data.clickBase = 3000; data.rank = "Blanquito Celestial ✨";
                skin.style.background = "#ffffaa"; skin.style.boxShadow = "inset -10px -10px 0 #ffaa00";
                alertToast("¡EL DIOS DE LOS MUNDOS!");
            }
            noise(440, 'square', 0.15);
            update();
        }

        // Comprar Automatización
        function buyMiner(id) {
            if (data.score >= prices[id]) {
                data.score -= prices[id];
                if (id === 'pick') { data.autoBase += 1; prices.pick = Math.floor(prices.pick * 1.35); }
                if (id === 'creeper') { data.autoBase += 6; prices.creeper = Math.floor(prices.creeper * 1.35); }
                if (id === 'golem') { data.autoBase += 40; prices.golem = Math.floor(prices.golem * 1.35); }
                if (id === 'quarry') { data.autoBase += 250; prices.quarry = Math.floor(prices.quarry * 1.35); }
                noise(280, 'sine', 0.08);
                update();
            }
        }

        // Mecánica de Viaje / Dimensión
        function travel(w) {
            if (w === 2 && data.score >= 800 && !data.unlockedWorlds.includes(2)) { data.score -= 800; data.unlockedWorlds.push(2); }
            if (w === 3 && data.score >= 5000 && !data.unlockedWorlds.includes(3)) { data.score -= 5000; data.unlockedWorlds.push(3); }
            
            data.currentWorld = w;
            if (w === 1) { data.worldMult = 1; stage.style.backgroundColor = "#318047"; document.getElementById('world-name').innerText = "Mundo Bloques"; }
            if (w === 2) { data.worldMult = 3; stage.style.backgroundColor = "#151525"; document.getElementById('world-name').innerText = "Vacío Hacker"; }
            if (w === 3) { data.worldMult = 10; stage.style.backgroundColor = "#3a153d"; document.getElementById('world-name').innerText = "El Fin del Mapa"; }
            
            alertToast("Viajando por el Mapa...");
            noise(600, 'sine', 0.3);
            update();
        }

        // Prestigio (Renacer)
        function doPrestige() {
            if (data.score >= 100000) {
                data.loreMultiplier += 5;
                data.score = 0; data.clickBase = 1; data.autoBase = 0;
                data.rank = "Gatito Novato"; data.currentWorld = 1; data.worldMult = 1;
                data.unlockedWorlds = [1]; data.unlockedSkins = [];
                prices = { pick: 40, creeper: 250, golem: 1800, quarry: 12000 };
                skin.style.background = "#b5b5b5"; skin.style.boxShadow = "inset -10px -10px 0 #8c8c8c";
                stage.style.backgroundColor = "#318047";
                alertToast("¡El universo se ha reiniciado con más PODER!");
                noise(800, 'square', 0.5);
                update();
            }
        }

        // Actualizar Interfaz Completa
        function update() {
            document.getElementById('score').innerText = Math.floor(data.score);
            document.getElementById('rank').innerText = data.rank;
            document.getElementById('multi').innerText = (data.worldMult * data.loreMultiplier);
            document.getElementById('cps').innerText = Math.floor(data.autoBase * data.worldMult * data.loreMultiplier);

            // Precios UI
            document.getElementById('p1').innerText = prices.pick + " 💎"; document.getElementById('p2').innerText = prices.creeper + " 💎";
            document.getElementById('p3').innerText = prices.golem + " 💎"; document.getElementById('p4').innerText = prices.quarry + " 💎";

            // Control de desbloqueo de botones
            document.getElementById('skin1').disabled = data.score < 20 || data.rank !== "Gatito Novato";
            document.getElementById('skin2').disabled = data.score < 150 || data.rank !== "Blanquito 🤍";
            document.getElementById('skin3').disabled = data.score < 1000 || data.rank !== "Tigre 🐯";
            document.getElementById('skin4').disabled = data.score < 6000 || data.rank !== "Pelusa Nube ☁️";
            document.getElementById('skin5').disabled = data.score < 30000 || data.rank !== "Gato Hacker 💻";

            document.getElementById('auto1').disabled = data.score < prices.pick;
            document.getElementById('auto2').disabled = data.score < prices.creeper;
            document.getElementById('auto3').disabled = data.score < prices.golem;
            document.getElementById('auto4').disabled = data.score < prices.quarry;

            // Mundos mundos botones
            document.getElementById('btn-world2').disabled = data.score < 800 && !data.unlockedWorlds.includes(2);
            if(data.unlockedWorlds.includes(2) && data.currentWorld !== 2) document.getElementById('btn-world2').innerHTML = "<span>• Entrar al Vacío</span> <span style='color:#55ff55'>OK</span>";
            
            document.getElementById('btn-world3').disabled = data.score < 5000 && !data.unlockedWorlds.includes(3);
            if(data.unlockedWorlds.includes(3) && data.currentWorld !== 3) document.getElementById('btn-world3').innerHTML = "<span>• Entrar al Fin</span> <span style='color:#55ff55'>OK</span>";

            // Barra de Exp e Habilitar Prestigio
            let pct = Math.min((data.score / 100000) * 100, 100);
            document.getElementById('exp-bar').style.width = pct + "%";
            document.getElementById('btn-prestige').disabled = data.score < 100000;
        }

        function alertToast(msg) {
            let t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        update();
    </script>
</body>
</html>
